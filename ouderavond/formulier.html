    <!-- Formulier Content -->
    <header>
        <h1>Contact Formulier</h1>
    </header>

    <section>
        <form action="#" method="post">
            <label for="naam">Naam:</label>
            <input type="text" id="naam" name="naam" required> <br> <br>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required> <br> <br>

            <label for="geboortedatum">Geboortedatum:</label>
            <input type="date" id="geboortedatum" name="geboortedatum" required> <br> <br>

            <label for="geslacht">Geslacht:</label>
            <select id="geslacht" name="geslacht" required>
                <option value="man">Man</option>
                <option value="vrouw">Vrouw</option>
                <option value="anders">Anders</option>
            </select> <br> <br> 

            <label for="bericht">Bericht:</label>
            <textarea id="bericht" name="bericht" rows="4" required></textarea> <br> <br>

            <label for="nieuwsbrief">Inschrijven voor nieuwsbrief:</label>
            <input type="checkbox" id="nieuwsbrief" name="nieuwsbrief"> <br> <br>

            <input type="submit" value="Verzenden">
        </form>
    </section>
